name: Python Quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Pre-commit checks
        run: python -m pre_commit run --all-files

      - name: Ruff lint
        run: python -m ruff check ml/alphazero_lite script/ai

      - name: Ruff format check
        run: python -m ruff format --check ml/alphazero_lite script/ai

      - name: Smoke test run manifest
        run: python -m unittest ml.alphazero_lite.test_run_manifest -v
